name: Test Suite
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/czechibank
      SECRET_KEY: "test-secret-key-for-jwt-encryption"
      BETTER_AUTH_SECRET: "test-secret-key-for-better-auth!"
      BETTER_AUTH_URL: "http://localhost:3000"
      HOST: "localhost:3000"
      DISCORD_WEBHOOK_URL: ""
      ENV: "CI"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: czechibank
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm exec prisma generate
      - name: Run database migrations
        run: pnpm exec prisma migrate deploy
      - name: Fill database with test data
        run: pnpm db:seed:users && pnpm db:seed:features
      - name: Build application
        run: pnpm run build
      - name: Start application
        run: pnpm start &
      - name: Wait for application to start
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health | grep -q '"status":"ok"'; then
              echo "Application is ready!"
              exit 0
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 1
          done
          echo "Application failed to start"
          exit 1
      - name: Run API tests
        run: pnpm run test:api
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3000
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Upload results to Zephyr Scale
        if: always()
        run: |
          if [ -f "results.xml" ]; then
            echo "Uploading test results to Zephyr Scale..."
            curl -X POST "https://api.zephyrscale.smartbear.com/v2/automations/executions/junit?projectKey=CZBANK&autoCreateTestCases=true&testCaseKeyCustomField=tag" \
              -H "Authorization: Bearer ${{ secrets.ZEPHYR_TOKEN }}" \
              -F "file=@results.xml"
          else
            echo "results.xml not found, skipping upload."
          fi
